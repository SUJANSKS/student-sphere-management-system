<!DOCTYPE html>
<html>
<head>
    <title>Applications</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="container">

    <h2>Applications</h2>

    <div class="card">

        <table border="1" width="100%">
            <tr>
                <th>Student</th>
                <th>Job</th>
                <th>Status</th>
                <th>Action</th>
            </tr>

            <tr th:each="app : ${apps}">
                <td th:text="${app.studentName}"></td>
                <td th:text="${app.jobTitle}"></td>
                <td th:text="${app.status}"></td>
                <td>
    <!-- If PENDING -->
    <span th:if="${app.status == 'PENDING'}">
        <a th:href="@{/approve/{id}(id=${app.id})}">Approve</a> |
        <a th:href="@{/reject/{id}(id=${app.id})}">Reject</a>
    </span>

    <!-- If APPROVED -->
    <span th:if="${app.status == 'APPROVED'}" style="color: green;">
        ✔ Approved
    </span>

    <!-- If REJECTED -->
    <span th:if="${app.status == 'REJECTED'}" style="color: red;">
        ❌ Rejected
    </span>
</td>
            </tr>
        </table>

    </div>

</div>

</body>
</html>
