<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>

    <style>
        body {
            background-color: #0b0f19;
            color: white;
            font-family: Arial;
        }

        .container {
            width: 80%;
            margin: auto;
        }

        h2 {
            margin-top: 20px;
        }

        .card {
            background: #1a1f2e;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #2a2f3e;
            border: none;
            color: white;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            background: red;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>

</head>

<body>

<div class="container">

    <h2>🎓 Student Dashboard & Core Profile</h2>

    <!-- Profile Summary -->
    <div class="card">
        <h3>Profile Summary</h3>
        <p>Full Name: --</p>
        <p>CGPA: --</p>
        <p>Branch: CSE</p>
    </div>

    <!-- Update Profile -->
    <div class="card">
        <h3>Update Core Profile</h3>

        <form action="/profile/save" method="post">

            Full Name:
            <input type="text" name="fullName">

            CGPA:
            <input type="text" name="cgpa">

            Skills:
            <input type="text" name="skills">

            Certifications:
            <input type="text" name="certifications">

            Projects:
            <textarea name="projects"></textarea>

            <button type="submit">Save Profile</button>

        </form>
    </div>

</div>

</body>
</html>
